# ===================================
# DATABASE CONNECTION CONFIGURATION
# ===================================
# MySQL database connection URL - Replace <database_name> with your actual database name
spring.datasource.url = jdbc:mysql://localhost:3306/<database_name>

# Database username - Replace <username> with your MySQL username
spring.datasource.username = <username>

# Database password - Replace <password> with your MySQL password
spring.datasource.password = <password>

# MySQL JDBC driver class
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================
# Schema generation strategy:
# - update: Updates the schema if needed (recommended for development)
# - create: Drops and recreates schema on startup (WARNING: loses all data!)
# - create-drop: Creates schema on startup, drops on shutdown
# - validate: Only validates schema, makes no changes (recommended for production)
# - none: No schema management
spring.jpa.hibernate.ddl-auto = update

# Show SQL statements in console (useful for debugging)
spring.jpa.show-sql = true

# Format SQL output for better readability
spring.jpa.properties.hibernate.format_sql = true

# MySQL dialect for Hibernate
spring.jpa.database-platform = org.hibernate.dialect.MySQLDialect

# ===================================
# SPRING BOOT DEVTOOLS (AUTO-RESTART)
# ===================================
# Enable automatic restart when classpath files change
spring.devtools.restart.enabled = true

# Additional paths to watch for changes (optional)
spring.devtools.restart.additional-paths = src/main/resources

# Paths to exclude from restart trigger (optional)
# spring.devtools.restart.exclude = static/**,public/**

# Enable LiveReload for browser auto-refresh (optional)
spring.devtools.livereload.enabled = true

# ===================================
# THYMELEAF CONFIGURATION
# ===================================
spring.thymeleaf.cache=false

#==================================
# JWT CONFIGURATION
#==================================
app.jwt.secret=!*ThisIsAsecret*!

# ===================================
# DATABASE SEEDING
# ===================================
# Uncomment to seed the database upon startup
spring.profiles.active = manual-seeding